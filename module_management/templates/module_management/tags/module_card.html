<div class="card mb-3">
    <div class="card-header d-flex justify-content-between align-items-center">
        <h5 class="card-title mb-0">{{ module.name }}</h5>
        {% if module.is_active %}
        <span class="badge bg-success">Active</span>
        {% else %}
        <span class="badge bg-secondary">Inactive</span>
        {% endif %}
    </div>
    <div class="card-body">
        <p class="card-text">{{ module.description|default:"No description available." }}</p>
        <div class="d-flex justify-content-between align-items-center">
            <small class="text-muted">Code: {{ module.code }}</small>
            {% if module.price_monthly > 0 %}
            <small class="text-muted">{{ module.price_monthly }} € / month</small>
            {% endif %}
        </div>
    </div>
</div>
