{% if modules %}
<div class="modules-menu mb-3">
    <div class="list-group">
        {% for module in modules %}
        <a class="list-group-item list-group-item-action {% if request.path == module.url %}active{% endif %}" href="#">
            {% if module.icon %}
            <i class="{{ module.icon }} me-2"></i>
            {% endif %}
            {{ module.name }}
        </a>
        {% endfor %}
    </div>
</div>
{% endif %}
